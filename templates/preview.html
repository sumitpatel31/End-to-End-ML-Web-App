
<div class="container">
    <h2>Dataset Preview</h2>

    <div class="table-container">
        {{ tables[0]|safe }}
    </div>

    <form method="POST" action="/preprocess">
        <label>Select Target Column</label>
        <select name="target">
            {% for col in cols %}
                <option value="{{col}}">{{col}}</option>
            {% endfor %}
        </select>

        <button type="submit">Continue</button>
    </form>
</div>
