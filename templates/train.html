
<div class="container">
    <h2>Model Performance</h2>

    <table border="1" width="100%">
        <tr>
            <th>Model</th>
            <th>Score</th>
        </tr>

        {% for k,v in results.items() %}
        <tr>
            <td>{{k}}</td>
            <td>{{v}}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/predict"><button>Go to Prediction</button></a>
</div>
